add_newline = true
command_timeout = 1000

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[directory]
truncation_length = 4
truncate_to_repo  = true

[git_branch]
symbol = " "

[git_status]
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted= ""
untracked = ""
modified  = ""
staged    = ""

[cmd_duration]
min_time = 500
format   = "took [$duration]($style) "

[aws]
disabled = true
[gcloud]
disabled = true
[azure]
disabled = true
